<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Meu Portefólio</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'portefolio_app/css/style.css' %}">
    <style>
        .auth-container {
            background-color: #1a1a1a;
            border: 3px solid #00ff2a;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            margin: 40px auto;
            color: white;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .auth-form input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #00ff2a;
            background: #000;
            color: #00ff2a;
        }
        .auth-form button {
            background-color: #00ff2a;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .auth-form button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Portefólio</h1>
        <nav class="navbar">
            <ul>
                <li><a href="{% url 'portefolio_app:home' %}"><img src="{% static 'portefolio_app/images/icons/home.gif' %}" alt="Home" class="nav-icon"> Home</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="auth-container">
            <h2>Criar Conta</h2>
            
            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Registar</button>
            </form>

            <p style="margin-top: 20px;">Já tem conta? <a href="{% url 'accounts:login' %}" style="color: #00ff2a;">Faça login aqui</a></p>
        </div>
    </main>
</body>
</html>
